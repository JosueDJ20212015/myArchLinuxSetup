# background
background {
    monitor =
    path = screenshot
    color = $background
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# general
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = false
}

# animations
animations {
    enabled = true
}

# input field
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(51, 204, 255, 1)
    inner_color = rgba(20, 40, 60, 0.9)
    font_color = rgba(230, 245, 255, 1)
    fade_on_empty = false
    rounding = -1
    check_color = rgba(51, 204, 255, 1)
    fail_color = rgba(255, 85, 85, 1)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    placeholder_text = <i><span foreground="##8fb8cc">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(180, 225, 245, 0.85)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 300
    halign = center
    valign = center
}

# time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(180, 225, 245, 0.9)
    font_size = 95
    font_family = JetBrains Mono Extrabold
    position = 0, 200
    halign = center
    valign = center
}